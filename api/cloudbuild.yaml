# Cloud Build config for the kmp-api Cloud Run service.
# Fired by the deploy-kmp-api trigger on pushes to main that touch api/**.
# Build context is api/ (this file's directory).

steps:
  # 1. Build the image from api/Dockerfile.
  - name: gcr.io/cloud-builders/docker
    dir: api
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kmp-api:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kmp-api:latest
      - .

  # 2. Push both tags (deploy below references the pushed :$COMMIT_SHA).
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kmp-api

  # 3. Deploy. --image keeps existing env vars (MISTRAL/LLAMA/PINECONE keys +
  #    PINECONE_INDEX_NAME) and runtime SA — they must already be set on the
  #    service (via gcloud run deploy --set-env-vars; CI never sets them).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - kmp-api
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kmp-api:$COMMIT_SHA
      - --region=us-central1
      - --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY
